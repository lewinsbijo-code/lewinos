<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LewinOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05070a;--bg2:#0a0e14;--bg3:#0f1520;--bg4:#141d28;
  --border:#1a2535;--border2:#243042;
  --text:#ffffff;--text2:#c8d4e0;--text3:#6b7f94;
  --accent:#3b82f6;--accent2:#2563eb;--accent-dim:#0c1a35;
  --green:#22c55e;--green-dim:#051a0e;
  --amber:#f59e0b;--amber-dim:#1c1200;
  --red:#ef4444;--red-dim:#1c0505;
  --purple:#a855f7;--purple-dim:#150828;
  --cyan:#06b6d4;--cyan-dim:#021218;
  --radius:8px;--radius-lg:14px;--radius-xl:20px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{width:380px;padding:44px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl)}
.login-logo{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1.5px;margin-bottom:4px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:11px;color:var(--text3);margin-bottom:36px;letter-spacing:2px;text-transform:uppercase}
.login-label{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:block;font-weight:600}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:13px 15px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:18px}
.login-input:focus{border-color:var(--accent)}
.login-check{display:flex;align-items:center;gap:8px;margin-bottom:28px;cursor:pointer;font-size:13px;color:var(--text2)}
.login-check input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius);padding:14px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:background 0.2s}
.login-btn:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:12px;margin-bottom:14px;display:none;padding:10px 14px;background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius)}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:24px}
.logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.8px;cursor:pointer}
.logo span{color:var(--accent)}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);letter-spacing:0.5px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 14px;color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
.logout-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;transition:color 0.2s;font-family:'Inter',sans-serif;font-weight:500}
.logout-btn:hover{color:var(--red)}

/* LAYOUT */
#main{display:flex;flex:1;min-height:0}
#sidebar{width:230px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;overflow-y:auto}
.nav-section{margin-bottom:8px}
.nav-section-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:10px 20px 6px;display:block;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;cursor:pointer;transition:all 0.15s;color:var(--text3);font-size:13px;font-weight:500;border-left:2px solid transparent;margin:1px 0}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{background:var(--bg3);color:#fff;border-left-color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:32px}

/* PAGE HEADER */
.page-header{margin-bottom:32px}
.page-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);font-weight:400}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:18px;letter-spacing:1.5px;text-transform:uppercase}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* METRICS */
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px}
.metric-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.metric-value{font-size:30px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1px}
.metric-value.accent{color:var(--accent)}
.metric-value.green{color:var(--green)}
.metric-value.amber{color:var(--amber)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);border:none;border-radius:var(--radius);padding:10px 18px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s}
.btn:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;border-radius:var(--radius);padding:9px 16px;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red-dim);border:1px solid var(--red);color:var(--red);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;border-radius:var(--radius);padding:6px 12px;cursor:pointer;transition:opacity 0.2s}
.btn-danger:hover{opacity:0.8}

/* FORM */
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;font-weight:600}
.input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.input:focus{border-color:var(--accent)}
.select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none;cursor:pointer}
.textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:80px;transition:border-color 0.2s}
.textarea:focus{border-color:var(--accent)}

/* TAGS */
.tag{display:inline-flex;align-items:center;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text2);font-weight:500}
.tag.green{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.tag.amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.tag.red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.tag.accent{background:var(--accent-dim);border-color:var(--accent);color:#60a5fa}
.tag.purple{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--bg3);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text3);transition:all 0.15s;font-weight:600;letter-spacing:0.3px}
.tab:hover{color:var(--text2)}
.tab.active{background:var(--bg2);color:#fff;border:1px solid var(--border2)}

/* LIST ITEMS */
.list-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-item-content{flex:1;min-width:0}
.list-item-title{font-size:13px;color:#fff;margin-bottom:3px;font-weight:500}
.list-item-sub{font-size:11px;color:var(--text3)}

/* CHECKBOX */
.checkbox{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px}
.checkbox:hover{border-color:var(--accent)}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}

/* MODULE CARDS */
.module-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.module-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px)}
.module-card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px}
.module-card-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:5px;letter-spacing:-0.3px}
.module-card-desc{font-size:12px;color:var(--text3);line-height:1.5;font-weight:400}
.module-card-stats{display:flex;gap:12px;margin-top:16px;font-size:12px;color:var(--text3);font-weight:500}
.module-card-stats span{color:#fff;font-weight:600}

/* BADGES */
.priority{display:inline-flex;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.priority.high{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.priority.med{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.priority.low{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}

.stage{display:inline-flex;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.stage.new{background:var(--accent-dim);color:#60a5fa;border:1px solid var(--accent)}
.stage.contacted{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple)}
.stage.interested{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.stage.negotiating{background:#1a1200;color:#facc15;border:1px solid #facc15}
.stage.closed{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.stage.rejected{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}

.screen-status{display:inline-flex;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.screen-status.planned{background:var(--accent-dim);color:#60a5fa;border:1px solid var(--accent)}
.screen-status.active{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.screen-status.maintenance{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.screen-status.removed{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}

/* PROGRESS */
.progress-bar{background:var(--bg4);border-radius:20px;height:5px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:20px;background:var(--accent);transition:width 0.5s}

/* EMPTY STATE */
.empty-state{text-align:center;padding:52px 24px;color:var(--text3)}
.empty-state-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
.empty-state p{font-size:13px;line-height:1.7;color:var(--text3)}

/* QUICK CAPTURE */
.qc-bar{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:28px;display:flex;gap:12px;align-items:center}
.qc-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none}
.qc-input:focus{border-color:var(--accent)}
.qc-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;white-space:nowrap}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px 11px 38px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease;font-weight:500}
.toast-item.success{border-color:var(--green);color:var(--green)}
.toast-item.error{border-color:var(--amber);color:var(--amber)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* OFFLINE */
#offline-banner{background:var(--amber-dim);border-bottom:1px solid var(--amber);padding:9px 24px;font-size:12px;color:var(--amber);display:none;align-items:center;gap:8px;font-weight:600}

@media(max-width:768px){
  #sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  #content{padding:18px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
const JSONBIN_BIN_ID = '6a238aa1da38895dfe8f6a56';
const JSONBIN_KEY = '$2a$10$CIHnQinqYxnaRDkfr.tDBu0RXUclMvjiQMT4SIyMtt6WGNeooJW3S';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

const StorageService = {
  _data:null,_dirty:false,_syncTimer:null,
  async loadData(){
    try{
      const res=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':'false'}});
      if(!res.ok)throw new Error();
      const json=await res.json();
      this._data=json;localStorage.setItem('lewinos_cache',JSON.stringify(json));return json;
    }catch(e){
      const c=localStorage.getItem('lewinos_cache');
      if(c){this._data=JSON.parse(c);return this._data;}
      this._data=this._defaultData();return this._data;
    }
  },
  async saveData(path,value){
    if(!this._data)await this.loadData();
    this._setNested(this._data,path,value);
    this._data.meta=this._data.meta||{};
    this._data.meta.lastSync=new Date().toISOString();
    localStorage.setItem('lewinos_cache',JSON.stringify(this._data));
    this._dirty=true;
    if(this._syncTimer)clearTimeout(this._syncTimer);
    this._syncTimer=setTimeout(()=>this.syncData(),1500);
    return true;
  },
  async syncData(){
    if(!this._dirty||!this._data)return;
    try{
      const res=await fetch(JSONBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify(this._data)});
      if(res.ok){this._dirty=false;showToast('Synced to cloud','success');}
    }catch(e){showToast('Offline — saved locally','error');}
  },
  getData(path){if(!this._data)return null;return path?this._getNested(this._data,path):this._data;},
  _getNested(obj,path){return path.split('.').reduce((o,k)=>o&&o[k]!==undefined?o[k]:null,obj);},
  _setNested(obj,path,value){const keys=path.split('.');let cur=obj;for(let i=0;i<keys.length-1;i++){if(!cur[keys[i]]||typeof cur[keys[i]]!=='object')cur[keys[i]]={};cur=cur[keys[i]];}cur[keys[keys.length-1]]=value;},
  _defaultData(){return{meta:{version:'1.0.0',appName:'LewinOS',lastSync:null,createdAt:new Date().toISOString()},user:{username:'lewin',passwordHash:'',rememberMe:false,preferences:{theme:'dark'}},diary:{brain:{captures:[],tags:[],categories:['Business Ideas','Content Ideas','Trading Thoughts','Random Notes']},planner:{tasks:[]},goals:{longTerm:[],shortTerm:[],milestones:[]},journal:{entries:[]},notesVault:{notes:[],folders:[]}},disciplScreens:{screens:[],leads:[],locker:{notes:[],research:[],businessIdeas:[]},planningBoard:{tasks:[],opportunities:[],followUps:[]}},futureModules:{}};}
};

const ModuleRegistry={
  _modules:{},
  register(mod){this._modules[mod.id]=mod;},
  getAll(){return Object.values(this._modules);},
  get(id){return this._modules[id];}
};

let appState={loggedIn:false,currentModule:'dashboard',currentSubModule:null,data:null};

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  const item=document.createElement('div');
  item.className=`toast-item ${type}`;
  item.textContent=(type==='success'?'✓ ':type==='error'?'⚡ ':'')+msg;
  t.appendChild(item);setTimeout(()=>item.remove(),3000);
}

function formatDate(d){if(!d)return '';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function checkLogin(){
  const s=localStorage.getItem('lewinos_auth');
  if(s){const a=JSON.parse(s);if(a.loggedIn){appState.loggedIn=true;return true;}}return false;
}

function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Lewin<span>OS</span></div>
      <div class="login-sub">Personal Operating System</div>
      <div class="login-error" id="login-err">⚠ Invalid credentials. Try again.</div>
      <label class="login-label">Username</label>
      <input class="login-input" id="l-user" type="text" placeholder="Enter username" autocomplete="username">
      <label class="login-label">Password</label>
      <input class="login-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <label class="login-check"><input type="checkbox" id="l-rem"> Remember me on this device</label>
      <button class="login-btn" onclick="doLogin()">BOOT SYSTEM →</button>
    </div>
  </div>`;
  document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const rem=document.getElementById('l-rem').checked;
  if(u==='lewin'&&p==='9890'){
    appState.loggedIn=true;
    if(rem)localStorage.setItem('lewinos_auth',JSON.stringify({loggedIn:true}));
    initApp();
  }else{document.getElementById('login-err').style.display='block';}
}

function doLogout(){localStorage.removeItem('lewinos_auth');appState.loggedIn=false;renderLogin();}

ModuleRegistry.register({
  id:'diary',name:'Diary',icon:'📓',desc:'Brain, Planner, Goals, Journal & Notes',
  color:'#3b82f6',colorDim:'#0c1a35',
  subModules:['brain','planner','goals','journal','notes'],
  getStats(data){const d=data?.diary||{};const tasks=(d.planner?.tasks||[]).filter(t=>!t.done).length;const ideas=(d.brain?.captures||[]).length;return `<span>${tasks}</span> pending tasks &nbsp;·&nbsp; <span>${ideas}</span> ideas`;}
});
ModuleRegistry.register({
  id:'discipl',name:'Discipl Screens',icon:'📺',desc:'Leads, Screens, Locker & Planning',
  color:'#22c55e',colorDim:'#051a0e',
  subModules:['leads','screens','locker','planning'],
  getStats(data){const d=data?.disciplScreens||{};const screens=(d.screens||[]).filter(s=>s.status==='active').length;const leads=(d.leads||[]).filter(l=>l.stage!=='rejected'&&l.stage!=='closed').length;return `<span>${screens}</span> active screens &nbsp;·&nbsp; <span>${leads}</span> leads`;}
});
ModuleRegistry.register({
  id:'finance',name:'Finance',icon:'💹',desc:'Opens your Finance App in a new tab',
  color:'#a855f7',colorDim:'#150828',
  isExternal:true,externalUrl:'https://lewinfin.vercel.app',
  getStats(){return 'External application';}
});

async function initApp(){
  document.getElementById('app').innerHTML=`
  <div id="offline-banner">⚡ You are offline. Changes saved locally and will sync when reconnected.</div>
  <div id="topbar">
    <div class="topbar-left">
      <div class="logo" onclick="navigate('dashboard')">Lewin<span>OS</span></div>
      <div class="topbar-status"><div class="status-dot" id="sync-dot"></div><span id="sync-status">Connecting...</span></div>
    </div>
    <div class="topbar-right">
      <button class="sync-btn" onclick="forceSync()">↺ Sync Now</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

function renderSidebar(){
  const mods=ModuleRegistry.getAll();
  let html=`<div class="nav-section">
    <span class="nav-section-label">System</span>
    <div class="nav-item ${appState.currentModule==='dashboard'?'active':''}" onclick="navigate('dashboard')">
      <span style="font-size:15px">⊞</span> Dashboard
    </div>
  </div>
  <div class="nav-section"><span class="nav-section-label">Modules</span>`;
  mods.forEach(m=>{
    html+=`<div class="nav-item ${appState.currentModule===m.id?'active':''}" onclick="navigate('${m.id}')">
      <span style="font-size:15px">${m.icon}</span> ${m.name}
    </div>`;
    if(appState.currentModule===m.id&&m.subModules){
      const names={brain:'Brain',planner:'Planner',goals:'Goals',journal:'Journal',notes:'Notes Vault',leads:'Leads',screens:'Screens',locker:'Locker',planning:'Planning'};
      m.subModules.forEach(sub=>{
        html+=`<div class="nav-item ${appState.currentSubModule===sub?'active':''}" style="padding-left:40px;font-size:12px;color:${appState.currentSubModule===sub?'#fff':'var(--text3)'}" onclick="navigate('${m.id}','${sub}')">
          ${names[sub]||sub}
        </div>`;
      });
    }
  });
  html+='</div>';
  return html;
}

function updateSidebar(){document.getElementById('sidebar').innerHTML=renderSidebar();}

function navigate(moduleId,subModule=null){
  if(moduleId==='finance'){window.open('https://lewinfin.vercel.app','_blank');return;}
  appState.currentModule=moduleId;
  appState.currentSubModule=subModule||(moduleId!=='dashboard'?ModuleRegistry.get(moduleId)?.subModules?.[0]:null);
  updateSidebar();renderContent();
}

async function forceSync(){

function renderContent(){

function renderDashboard(){

  const now=new Date();
  const hr=now.getHours();
  const greet=hr<12?'Good Morning':'Good Afternoon';
  const dateStr=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  let modsHtml=mods.map(m=>`

        </div>
      </div>
    </div>`).join(''):'<div class="empty-state"><div class="empty-state-icon">✓</div><p>All clear — no pending tasks.</p></div>';

  let ideasHtml=captures.length?captures.map(c=>`
    <div class="list-item">
      <div class="list-item-content">
        <div class="list-item-title">${c.text}</div>
        <div class="list-item-sub">${c.category||'Note'} · ${formatDate(c.createdAt)}</div>
      </div>
    </div>`).join(''):'<div class="empty-state"><div class="empty-state-icon">💡</div><p>No ideas captured yet.</p></div>';

  return `
    <div class="page-header">
      <div class="page-title">${greet}, Lewin</div>
      <div class="page-sub">${dateStr}</div>
    </div>
    <div class="qc-bar">
      <span class="qc-label">Quick Capture</span>
      <input class="qc-input" id="qc-input" type="text" placeholder="Drop a thought, idea, or task...">
      <select id="qc-cat" class="select" style="width:140px">
        <option value="Random Notes">Random Notes</option>
        <option value="Business Ideas">Business Ideas</option>
        <option value="Content Ideas">Content Ideas</option>
        <option value="Trading Thoughts">Trading Thoughts</option>
        <option value="Task">Task</option>
      </select>
      <button class="btn" onclick="quickCapture()">+ Capture</button>
    </div>
    <div class="grid-3" style="margin-bottom:24px">${modsHtml}</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Today's Tasks</div>
        ${tasksHtml}
        <button class="btn-ghost" style="margin-top:14px;width:100%;text-align:center" onclick="navigate('diary','planner')">View All Tasks →</button>
      </div>
      <div class="card">
        <div class="card-title">Recent Captures</div>
        ${ideasHtml}
        <button class="btn-ghost" style="margin-top:14px;width:100%;text-align:center" onclick="navigate('diary','brain')">Open Brain →</button>
      </div>

async function quickCapture(){
  const input=document.getElementById('qc-input');const cat=document.getElementById('qc-cat');
  const text=input.value.trim();if(!text)return;
  const d=appState.data||{};
  if(!d.diary)d.diary=StorageService._defaultData().diary;
  if(cat.value==='Task'){
    const tasks=d.diary.planner.tasks||[];
    tasks.unshift({id:uid(),text,done:false,priority:'med',createdAt:new Date().toISOString()});
    await StorageService.saveData('diary.planner.tasks',tasks);
  }else{
    const captures=d.diary.brain.captures||[];
    captures.unshift({id:uid(),text,category:cat.value,tags:[],createdAt:new Date().toISOString()});
    await StorageService.saveData('diary.brain.captures',captures);
  }
  appState.data=StorageService.getData();input.value='';renderContent();showToast('Captured!','success');
}

async function updateGoalProgress(type,id){

}

async function addNote(){
  const title=document.getElementById('n-title').value.trim();const body=document.getElementById('n-body').value.trim();if(!title)return;
  const notes=appState.data.diary.notesVault.notes||[];
  notes.unshift({id:uid(),title,body,folder:document.getElementById('n-folder').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('diary.notesVault.notes',notes);appState.data=StorageService.getData();navigate('diary','notes');showToast('Note saved!','success');
}

async function deleteNote(id){
  const notes=appState.data.diary.notesVault.notes.filter(n=>n.id!==id);
  await StorageService.saveData('diary.notesVault.notes',notes);appState.data=StorageService.getData();navigate('diary','notes');
}

function filterNotes(){
  const q=document.getElementById('n-search').value.toLowerCase();
  document.querySelectorAll('[id^="note-"]').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});
}

function renderDisciples(sub){
  const fns={leads:renderLeads,screens:renderScreens,locker:renderLocker,planning:renderPlanning};
  const d=appState.data?.disciplScreens||{};
  const screens=d.screens||[];const leads=d.leads||[];
  const active=screens.filter(s=>s.status==='active').length;
  const planned=screens.filter(s=>s.status==='planned').length;
  const activeLeads=leads.filter(l=>l.stage==='new'||l.stage==='interested'||l.stage==='contacted').length;
  return `
    <div class="page-header">
      <div class="page-title">📺 Discipl Screens</div>
      <div class="page-sub">Leads · Screens · Locker · Planning</div>
    </div>
    <div class="grid-4" style="margin-bottom:26px">
      <div class="metric"><div class="metric-label">Total Screens</div><div class="metric-value accent">${screens.length}</div></div>
      <div class="metric"><div class="metric-label">Active</div><div class="metric-value green">${active}</div></div>
      <div class="metric"><div class="metric-label">Planned</div><div class="metric-value amber">${planned}</div></div>
      <div class="metric"><div class="metric-label">Active Leads</div><div class="metric-value">${activeLeads}</div></div>
    </div>
    <div class="tabs">
      ${['leads','screens','locker','planning'].map(s=>`<div class="tab ${sub===s?'active':''}" onclick="navigate('discipl','${s}')">${{leads:'Leads',screens:'Screens',locker:'Locker',planning:'Planning'}[s]}</div>`).join('')}
    </div>
    ${(fns[sub]||renderLeads)()}`;
}

function renderLeads(){
  const leads=(appState.data?.disciplScreens?.leads)||[];
  const stages=['new','contacted','interested','negotiating','closed','rejected'];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Add Lead</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="ld-name" placeholder="Contact name" style="flex:1;min-width:150px">
        <input class="input" id="ld-biz" placeholder="Business / Gym name" style="flex:1;min-width:150px">
        <input class="input" id="ld-phone" placeholder="Phone" style="width:140px">
        <input class="input" id="ld-email" placeholder="Email" style="width:180px">
        <select class="select" id="ld-stage" style="width:140px">${stages.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
        <button class="btn" onclick="addLead()">+ Add Lead</button>
      </div>
      <textarea class="textarea" id="ld-notes" placeholder="Notes..." style="margin-top:10px;min-height:60px"></textarea>
    </div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="ld-search" placeholder="Search leads..." oninput="filterLeads()"></div>
    ${leads.length?`
    <div class="card" id="leads-table" style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:600px">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);letter-spacing:1px;font-weight:700;text-transform:uppercase">Name</th>
          <th style="text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);letter-spacing:1px;font-weight:700;text-transform:uppercase">Business</th>
          <th style="text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);letter-spacing:1px;font-weight:700;text-transform:uppercase">Contact</th>
          <th style="text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);letter-spacing:1px;font-weight:700;text-transform:uppercase">Stage</th>
          <th style="text-align:left;padding:10px 14px;font-size:11px;color:var(--text3);letter-spacing:1px;font-weight:700;text-transform:uppercase">Actions</th>
        </tr></thead>
        <tbody>
        ${leads.map(l=>`
          <tr style="border-bottom:1px solid var(--border);transition:background 0.15s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''" id="lead-${l.id}">
            <td style="padding:13px 14px;font-size:14px;color:#fff;font-weight:500">${l.name}</td>
            <td style="padding:13px 14px;font-size:13px;color:var(--text2)">${l.business||'—'}</td>
            <td style="padding:13px 14px;font-size:12px;color:var(--text3)">${l.phone||''} ${l.email||''}</td>
            <td style="padding:13px 14px"><span class="stage ${l.stage}">${l.stage}</span></td>
            <td style="padding:13px 14px">
              <select class="select" style="width:130px;padding:5px 10px;font-size:12px" onchange="updateLeadStage('${l.id}',this.value)">
                ${stages.map(s=>`<option value="${s}" ${s===l.stage?'selected':''}>${s}</option>`).join('')}
              </select>
              <button class="btn-danger" style="margin-left:8px" onclick="deleteLead('${l.id}')">✕</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`:'<div class="empty-state"><div class="empty-state-icon">👥</div><p>No leads yet.<br>Start adding contacts!</p></div>'}`;
}

async function addLead(){
  const name=document.getElementById('ld-name').value.trim();if(!name)return;
  const leads=appState.data.disciplScreens.leads||[];
  leads.unshift({id:uid(),name,business:document.getElementById('ld-biz').value,phone:document.getElementById('ld-phone').value,email:document.getElementById('ld-email').value,stage:document.getElementById('ld-stage').value,notes:document.getElementById('ld-notes').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.leads',leads);appState.data=StorageService.getData();navigate('discipl','leads');showToast('Lead added!','success');
}

async function updateLeadStage(id,stage){
  const leads=appState.data.disciplScreens.leads;const l=leads.find(x=>x.id===id);
  if(l){l.stage=stage;await StorageService.saveData('disciplScreens.leads',leads);appState.data=StorageService.getData();navigate('discipl','leads');showToast('Stage updated','success');}
}

async function deleteLead(id){
  const leads=appState.data.disciplScreens.leads.filter(l=>l.id!==id);
  await StorageService.saveData('disciplScreens.leads',leads);appState.data=StorageService.getData();navigate('discipl','leads');
}

function filterLeads(){
  const q=document.getElementById('ld-search').value.toLowerCase();
  document.querySelectorAll('[id^="lead-"]').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});
}

function renderScreens(){
  const screens=(appState.data?.disciplScreens?.screens)||[];
  const statuses=['planned','active','maintenance','removed'];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Add Screen</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="sc-name" placeholder="Screen name" style="flex:1;min-width:150px">
        <input class="input" id="sc-gym" placeholder="Gym name" style="flex:1;min-width:150px">
        <input class="input" id="sc-loc" placeholder="Location / City" style="width:160px">
        <select class="select" id="sc-status" style="width:140px">${statuses.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
        <input class="input" id="sc-date" type="date" style="width:160px">
        <button class="btn" onclick="addScreen()">+ Add Screen</button>
      </div>
      <textarea class="textarea" id="sc-notes" placeholder="Notes..." style="margin-top:10px;min-height:60px"></textarea>
    </div>
    ${screens.length?`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
      ${screens.map(s=>`
        <div class="card-sm">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div>
              <div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:6px">${s.name}</div>
              <span class="screen-status ${s.status}">${s.status}</span>
            </div>
            <button class="btn-danger" onclick="deleteScreen('${s.id}')">✕</button>
          </div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:5px">🏋 ${s.gym||'—'}</div>
          <div style="font-size:13px;color:var(--text3)">📍 ${s.location||'—'}</div>
          ${s.installDate?`<div style="font-size:12px;color:var(--text3);margin-top:8px">Installed: ${formatDate(s.installDate)}</div>`:''}
          ${s.notes?`<div style="font-size:12px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${s.notes}</div>`:''}
        </div>`).join('')}
    </div>`:'<div class="empty-state"><div class="empty-state-icon">📺</div><p>No screens registered yet</p></div>'}`;
}

async function addScreen(){
  const name=document.getElementById('sc-name').value.trim();if(!name)return;
  const screens=appState.data.disciplScreens.screens||[];
  screens.push({id:uid(),name,gym:document.getElementById('sc-gym').value,location:document.getElementById('sc-loc').value,status:document.getElementById('sc-status').value,installDate:document.getElementById('sc-date').value||null,notes:document.getElementById('sc-notes').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.screens',screens);appState.data=StorageService.getData();navigate('discipl','screens');showToast('Screen added!','success');
}

async function deleteScreen(id){
  const screens=appState.data.disciplScreens.screens.filter(s=>s.id!==id);
  await StorageService.saveData('disciplScreens.screens',screens);appState.data=StorageService.getData();navigate('discipl','screens');
}

function renderLocker(){
  const locker=appState.data?.disciplScreens?.locker||{};
  const notes=locker.notes||[];const ideas=locker.businessIdeas||[];const research=locker.research||[];
  const allItems=[...notes.map(n=>({...n,_type:'Note'})),...research.map(r=>({...r,_type:'Research'})),...ideas.map(i=>({...i,_type:'Idea'}))];
  return `
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Add to Locker</div>
        <div class="field"><label>Title</label><input class="input" id="lk-title" placeholder="Title..."></div>
        <div class="field"><label>Content</label><textarea class="textarea" id="lk-body" placeholder="Notes, research, info..." style="min-height:90px"></textarea></div>
        <select class="select" id="lk-type" style="margin-bottom:14px">
          <option value="notes">Note</option>
          <option value="research">Research</option>
          <option value="businessIdeas">Business Idea</option>
        </select>
        <button class="btn" onclick="addToLocker()">+ Save to Locker</button>
      </div>
      <div class="card">
        <div class="card-title">Locked Items <span style="color:var(--text3)">(${allItems.length})</span></div>
        ${allItems.length?allItems.map(item=>`
          <div class="list-item">
            <div style="flex:1">
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
                <span class="tag accent">${item._type}</span>
                <span style="font-size:14px;color:#fff;font-weight:500">${item.title}</span>
              </div>
              <div style="font-size:13px;color:var(--text3);line-height:1.5">${item.body||item.text||''}</div>
            </div>
            <button class="btn-danger" style="align-self:flex-start;margin-left:12px" onclick="deleteLockerItem('${item._type.toLowerCase()}','${item.id}')">✕</button>
          </div>`).join(''):'<div class="empty-state"><p>Locker is empty</p></div>'}
      </div>
    </div>`;
}

async function addToLocker(){
  const title=document.getElementById('lk-title').value.trim();const body=document.getElementById('lk-body').value.trim();if(!title)return;
  const type=document.getElementById('lk-type').value;
  const locker=appState.data.disciplScreens.locker;
  locker[type]=locker[type]||[];locker[type].push({id:uid(),title,body,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.locker',locker);appState.data=StorageService.getData();navigate('discipl','locker');showToast('Saved to locker!','success');
}

async function deleteLockerItem(type,id){
  const typeMap={note:'notes',research:'research',idea:'businessIdeas'};
  const key=typeMap[type]||type+'s';
  const locker=appState.data.disciplScreens.locker;
  const arr=locker[key];if(arr){const idx=arr.findIndex(x=>x.id===id);if(idx>-1)arr.splice(idx,1);}
  await StorageService.saveData('disciplScreens.locker',locker);appState.data=StorageService.getData();navigate('discipl','locker');
}

function renderPlanning(){
  const pb=appState.data?.disciplScreens?.planningBoard||{};
  const tasks=pb.tasks||[];const opps=pb.opportunities||[];const followUps=pb.followUps||[];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Add Planning Item</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="pb-text" placeholder="Item description..." style="flex:1;min-width:200px">
        <select class="select" id="pb-type" style="width:170px">
          <option value="tasks">Task</option>
          <option value="opportunities">Opportunity</option>
          <option value="followUps">Follow-up</option>
        </select>
        <button class="btn" onclick="addPlanItem()">+ Add</button>
      </div>
    </div>
    <div class="grid-3">
      <div class="card">
        <div class="card-title">Tasks <span style="color:var(--text3)">(${tasks.length})</span></div>
        ${tasks.map(t=>`<div class="list-item"><div class="checkbox ${t.done?'checked':''}" onclick="togglePlanTask('${t.id}')"></div><div class="list-item-content"><div class="list-item-title" style="${t.done?'text-decoration:line-through;opacity:0.4':''}">${t.text}</div></div><button class="btn-danger" onclick="deletePlanItem('tasks','${t.id}')">✕</button></div>`).join('')||'<div class="empty-state"><p>No tasks</p></div>'}
      </div>
      <div class="card">
        <div class="card-title">Opportunities <span style="color:var(--text3)">(${opps.length})</span></div>
        ${opps.map(o=>`<div class="list-item"><div class="list-item-content"><div class="list-item-title">${o.text}</div><div class="list-item-sub">${formatDate(o.createdAt)}</div></div><button class="btn-danger" onclick="deletePlanItem('opportunities','${o.id}')">✕</button></div>`).join('')||'<div class="empty-state"><p>No opportunities</p></div>'}
      </div>
      <div class="card">
        <div class="card-title">Follow-ups <span style="color:var(--text3)">(${followUps.length})</span></div>
        ${followUps.map(f=>`<div class="list-item"><div class="list-item-content"><div class="list-item-title">${f.text}</div><div class="list-item-sub">${formatDate(f.createdAt)}</div></div><button class="btn-danger" onclick="deletePlanItem('followUps','${f.id}')">✕</button></div>`).join('')||'<div class="empty-state"><p>No follow-ups</p></div>'}
      </div>
    </div>`;
}

async function addPlanItem(){
  const text=document.getElementById('pb-text').value.trim();if(!text)return;
  const type=document.getElementById('pb-type').value;
  const pb=appState.data.disciplScreens.planningBoard;
  pb[type]=pb[type]||[];pb[type].push({id:uid(),text,done:false,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.planningBoard',pb);appState.data=StorageService.getData();navigate('discipl','planning');showToast('Added!','success');
}

async function togglePlanTask(id){
  const pb=appState.data.disciplScreens.planningBoard;const t=pb.tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;await StorageService.saveData('disciplScreens.planningBoard',pb);appState.data=StorageService.getData();navigate('discipl','planning');}
}

async function deletePlanItem(type,id){
  const pb=appState.data.disciplScreens.planningBoard;pb[type]=pb[type].filter(x=>x.id!==id);
  await StorageService.saveData('disciplScreens.planningBoard',pb);appState.data=StorageService.getData();navigate('discipl','planning');
}

if(checkLogin()){initApp();}else{renderLogin();}
</script>
</body>
</html>
