<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LewinOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0c;
  --surface:#141414;
  --surface2:#1a1a1a;
  --surface3:#202020;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0f0;
  --text2:#888;
  --text3:#555;
  --gold:#c9a96e;
  --gold-dim:#1a1408;
  --green:#4ade80;
  --green-dim:#0a1f12;
  --red:#f87171;
  --red-dim:#1f0a0a;
  --blue:#60a5fa;
  --blue-dim:#0a1220;
  --amber:#fbbf24;
  --r:6px;--rl:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::placeholder{color:var(--text3)}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-wrap{width:320px}
.login-mark{font-size:13px;font-weight:500;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.login-mark span{color:var(--gold)}
.login-title{font-size:28px;font-weight:300;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px;line-height:1.2}
.login-title strong{font-weight:600}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:40px}
.login-field{margin-bottom:16px}
.login-field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--gold)}
.login-remember{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-size:13px;color:var(--text3);cursor:pointer}
.login-remember input{accent-color:var(--gold);width:14px;height:14px}
.login-btn{width:100%;background:var(--gold);border:none;border-radius:var(--r);padding:14px;color:#0c0c0c;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-err{font-size:12px;color:var(--red);margin-bottom:16px;display:none}

/* ── SHELL ── */
#topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:99}
.t-logo{font-size:15px;font-weight:600;color:var(--text);cursor:pointer;letter-spacing:-0.3px}
.t-logo em{font-style:normal;color:var(--gold)}
.t-right{display:flex;align-items:center;gap:20px}
.t-sync{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.t-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;transition:color .15s}
.t-btn:hover{color:var(--text)}

#main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:200px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;overflow-y:auto;flex-shrink:0}
.s-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:16px 24px 8px;display:block}
.s-item{display:flex;align-items:center;gap:10px;padding:9px 24px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:400;transition:color .15s;position:relative}
.s-item:hover{color:var(--text2)}
.s-item.active{color:var(--text)}
.s-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:14px;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.s-sub{padding-left:40px;font-size:12px;padding-top:7px;padding-bottom:7px}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:36px 40px;max-width:1100px}

/* ── TYPOGRAPHY ── */
.ph{margin-bottom:32px}
.ph-title{font-size:22px;font-weight:500;color:var(--text);letter-spacing:-0.5px;margin-bottom:4px}
.ph-sub{font-size:13px;color:var(--text3);font-weight:300}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:20px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── STAT ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px 22px}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.stat-val{font-size:32px;font-weight:300;color:var(--text);letter-spacing:-1px;line-height:1}
.stat-val.gold{color:var(--gold)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}

/* ── MODULE TILES ── */
.m-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px 26px;cursor:pointer;transition:border-color .2s,background .2s}
.m-tile:hover{border-color:var(--border2);background:var(--surface2)}
.m-tile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.m-tile-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.m-tile-arrow{color:var(--text3);font-size:16px;transition:transform .2s}
.m-tile:hover .m-tile-arrow{transform:translate(2px,-2px)}
.m-tile-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
.m-tile-desc{font-size:12px;color:var(--text3);line-height:1.5;font-weight:300}
.m-tile-foot{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
.m-tile-foot span{color:var(--text2)}

/* ── FORM ── */
.f-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.inp{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;min-width:0}
.inp:focus{border-color:var(--gold)}
.inp.grow{flex:1;min-width:160px}
.sel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
.txa{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:72px;transition:border-color .2s}
.txa:focus{border-color:var(--gold)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--gold);border:none;border-radius:var(--r);padding:10px 18px;color:#0c0c0c;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;border-radius:var(--r);padding:8px 16px;cursor:pointer;transition:all .15s}
.btn-outline:hover{border-color:var(--text3);color:var(--text)}
.btn-ghost{background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:color .15s;padding:0}
.btn-ghost:hover{color:var(--red)}

/* ── LIST ── */
.li{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li-body{flex:1;min-width:0}
.li-title{font-size:13px;color:var(--text);margin-bottom:2px;font-weight:400}
.li-sub{font-size:11px;color:var(--text3)}

/* ── CHECKBOX ── */
.cb{width:16px;height:16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.cb:hover{border-color:var(--gold)}
.cb.on{background:var(--gold);border-color:var(--gold)}
.cb.on::after{content:'✓';color:#0c0c0c;font-size:9px;font-weight:700}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab{padding:10px 0;margin-right:28px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:1px solid transparent;margin-bottom:-1px;transition:color .15s;font-weight:400}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--text);border-bottom-color:var(--gold)}

/* ── BADGES ── */
.badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.badge.hi{background:var(--red-dim);color:var(--red)}
.badge.md{background:var(--gold-dim);color:var(--gold)}
.badge.lo{background:var(--green-dim);color:var(--green)}
.badge.new{background:var(--blue-dim);color:var(--blue)}
.badge.contacted{background:#180d20;color:#c084fc}
.badge.interested{background:var(--gold-dim);color:var(--gold)}
.badge.negotiating{background:#1a1400;color:#fde68a}
.badge.closed{background:var(--green-dim);color:var(--green)}
.badge.rejected{background:var(--red-dim);color:var(--red)}
.badge.planned{background:var(--blue-dim);color:var(--blue)}
.badge.active{background:var(--green-dim);color:var(--green)}
.badge.maintenance{background:var(--gold-dim);color:var(--amber)}
.badge.removed{background:var(--red-dim);color:var(--red)}

/* ── PROGRESS ── */
.prog{background:var(--surface3);border-radius:20px;height:3px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:var(--gold);transition:width .4s}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:20px}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px 10px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--border2)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

/* ── EMPTY ── */
.empty{text-align:center;padding:52px 20px}
.empty p{font-size:13px;color:var(--text3);font-weight:300;line-height:1.7}

/* ── QC BAR ── */
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:28px;display:flex;gap:10px;align-items:center}
.qc-hint{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:500;white-space:nowrap}
.qc-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:28px;z-index:999;display:flex;flex-direction:column;gap:8px}
.ti{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 16px;font-size:12px;color:var(--text2);animation:tin .25s ease;font-weight:400}
.ti.ok{color:var(--green)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── OFFLINE ── */
#ob{background:var(--surface);border-bottom:1px solid var(--amber);padding:7px 28px;font-size:11px;color:var(--amber);display:none;font-weight:500;letter-spacing:0.5px}

@media(max-width:720px){
  #sidebar{display:none}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .page{padding:20px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const BIN='6a238aa1da38895dfe8f6a56',KEY='$2a$10$CIHnQinqYxnaRDkfr.tDBu0RXUclMvjiQMT4SIyMtt6WGNeooJW3S',URL=`https://api.jsonbin.io/v3/b/${BIN}`;

/* ── STORAGE ── */
const S={
  d:null,dirty:false,t:null,
  async load(){
    try{const r=await fetch(URL+'/latest',{headers:{'X-Master-Key':KEY,'X-Bin-Meta':'false'}});if(!r.ok)throw 0;const j=await r.json();this.d=j;ls('set','lw_cache',JSON.stringify(j));return j}
    catch{const c=ls('get','lw_cache');if(c){this.d=JSON.parse(c);return this.d}this.d=this.def();return this.d}
  },
  async save(path,val){
    if(!this.d)await this.load();set(this.d,path,val);
    if(!this.d.meta)this.d.meta={};this.d.meta.lastSync=new Date().toISOString();
    ls('set','lw_cache',JSON.stringify(this.d));this.dirty=true;
    clearTimeout(this.t);this.t=setTimeout(()=>this.sync(),1600);
  },
  async sync(){
    if(!this.dirty||!this.d)return;
    try{const r=await fetch(URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':KEY},body:JSON.stringify(this.d)});if(r.ok){this.dirty=false;toast('Saved','ok')}}
    catch{toast('Offline — saved locally')}
  },
  get(p){return p?get(this.d,p):this.d},
  def(){return{meta:{v:'1.0',app:'LewinOS',lastSync:null},user:{},diary:{brain:{items:[],cats:['Business','Content','Trading','Random']},planner:{tasks:[]},goals:{lt:[],st:[]},journal:{entries:[]},notes:{list:[],folders:['General','Important','Research','Business']}},screens:{screens:[],leads:[],locker:{items:[]},plan:{tasks:[],opps:[],fu:[]}},fm:{}}}
};

function ls(op,k,v){try{if(op==='set')localStorage.setItem(k,v);else return localStorage.getItem(k)}catch{}}
function get(o,p){return p.split('.').reduce((a,k)=>a&&a[k]!==undefined?a[k]:null,o)}
function set(o,p,v){const ks=p.split('.');let c=o;for(let i=0;i<ks.length-1;i++){if(!c[ks[i]]||typeof c[ks[i]]!=='object')c[ks[i]]={};c=c[ks[i]]}c[ks[ks.length-1]]=v}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fd(d){if(!d)return'';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function toast(msg,type=''){const t=document.getElementById('toast'),i=document.createElement('div');i.className=`ti ${type}`;i.textContent=msg;t.appendChild(i);setTimeout(()=>i.remove(),2800)}

/* ── REGISTRY ── */
const R={_m:{},reg(m){this._m[m.id]=m},all(){return Object.values(this._m)},get(id){return this._m[id]}};

let st={page:'dash',sub:null,data:null};

/* ── AUTH ── */
function chkAuth(){const a=ls('get','lw_auth');if(a){const p=JSON.parse(a);if(p.ok){st.loggedIn=true;return true}}return false}

function showLogin(){
  document.getElementById('app').innerHTML=`
  <div id="login-screen">
    <div class="login-wrap">
      <div class="login-mark">Lewin<span>OS</span></div>
      <div class="login-title">Welcome <strong>back.</strong></div>
      <div class="login-sub">Sign in to your personal OS</div>
      <div class="login-err" id="lerr">Incorrect credentials</div>
      <div class="login-field"><input id="lu" type="text" placeholder="Username" autocomplete="username"></div>
      <div class="login-field"><input id="lp" type="password" placeholder="Password" autocomplete="current-password"></div>
      <label class="login-remember"><input type="checkbox" id="lr"> Keep me signed in</label>
      <button class="login-btn" onclick="doLogin()">Sign in →</button>
    </div>
  </div>`;
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
}

function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  if(u==='lewin'&&p==='9890'){
    st.loggedIn=true;
    if(document.getElementById('lr').checked)ls('set','lw_auth',JSON.stringify({ok:true}));
    boot();
  }else document.getElementById('lerr').style.display='block';
}
function doLogout(){ls('set','lw_auth','{}');st.loggedIn=false;showLogin()}

/* ── MODULES ── */
R.reg({id:'diary',name:'Diary',icon:'○',desc:'Second brain, tasks, goals, journal',
  sub:['brain','planner','goals','journal','notes'],
  stats(d){const t=(d?.diary?.planner?.tasks||[]).filter(x=>!x.done).length;const i=(d?.diary?.brain?.items||[]).length;return`<span>${t}</span> tasks · <span>${i}</span> ideas`}
});
R.reg({id:'screens',name:'Discipl Screens',icon:'□',desc:'Leads, screens, locker, planning',
  sub:['leads','screens','locker','plan'],
  stats(d){const s=(d?.screens?.screens||[]).filter(x=>x.status==='active').length;const l=(d?.screens?.leads||[]).filter(x=>!['closed','rejected'].includes(x.stage)).length;return`<span>${s}</span> active · <span>${l}</span> leads`}
});
R.reg({id:'finance',name:'Finance',icon:'◇',desc:'Personal finance dashboard',
  ext:true,url:'https://lewinfin.vercel.app',
  stats(){return'External app'}
});

/* ── BOOT ── */
async function boot(){
  document.getElementById('app').innerHTML=`
  <div id="ob">You are offline — changes saved locally</div>
  <div id="topbar">
    <div class="t-logo" onclick="go('dash')">Lewin<em>OS</em></div>
    <div class="t-right">
      <div class="t-sync"><div class="t-dot" id="tdot"></div><span id="tst" style="font-size:11px;color:var(--text3)">syncing…</span></div>
      <button class="t-btn" onclick="fsync()">sync</button>
      <button class="t-btn" onclick="doLogout()">sign out</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar"></div>
    <div id="content"></div>
  </div>`;

  window.addEventListener('offline',()=>{document.getElementById('ob').style.display='block';setDot('#fbbf24')});
  window.addEventListener('online',()=>{document.getElementById('ob').style.display='none';setDot('#4ade80');S.sync()});
  function setDot(c){const d=document.getElementById('tdot');if(d)d.style.background=c}

  toast('Loading…');
  st.data=await S.load();
  setDot('#4ade80');document.getElementById('tst').textContent='synced';
  go('dash');
}

async function fsync(){st.data=await S.load();S.dirty=true;await S.sync();render();toast('Synced','ok')}

/* ── NAV ── */
function go(page,sub=null){
  if(page==='finance'){window.open('https://lewinfin.vercel.app','_blank');return}
  st.page=page;st.sub=sub||(page!=='dash'?R.get(page)?.sub?.[0]:null);
  renderSidebar();render();
}

function renderSidebar(){
  const mods=R.all();
  let h=`<span class="s-label">Menu</span>
  <div class="s-item ${st.page==='dash'?'active':''}" onclick="go('dash')">Dashboard</div>
  <span class="s-label" style="margin-top:8px">Modules</span>`;
  mods.forEach(m=>{
    h+=`<div class="s-item ${st.page===m.id?'active':''}" onclick="go('${m.id}')">${m.name}</div>`;
    if(st.page===m.id&&m.sub){
      const nl={brain:'Brain',planner:'Planner',goals:'Goals',journal:'Journal',notes:'Notes',leads:'Leads',screens:'Screens',locker:'Locker',plan:'Planning'};
      m.sub.forEach(s=>{h+=`<div class="s-item s-sub ${st.sub===s?'active':''}" onclick="go('${m.id}','${s}')">${nl[s]||s}</div>`});
    }
  });
  document.getElementById('sidebar').innerHTML=h;
}

function render(){
  const c=document.getElementById('content');
  if(st.page==='dash')c.innerHTML=renderDash();
  else if(st.page==='diary')c.innerHTML=renderDiary(st.sub);
  else if(st.page==='screens')c.innerHTML=renderScreensMod(st.sub);
}

/* ── DASHBOARD ── */
function renderDash(){
  const d=st.data||{};const now=new Date();
  const hr=now.getHours();const g=hr<12?'Morning':hr<17?'Afternoon':'Evening';
  const tasks=(d.diary?.planner?.tasks||[]).filter(t=>!t.done).slice(0,5);
  const ideas=(d.diary?.brain?.items||[]).slice(0,4);
  const mods=R.all();

  return`<div class="page">
  <div class="ph" style="margin-bottom:36px">
    <div class="ph-title">Good ${g}, Lewin.</div>
    <div class="ph-sub">${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
  </div>
  <div class="qc">
    <span class="qc-hint">Capture</span>
    <input class="qc-inp" id="qci" type="text" placeholder="Drop a thought…">

async function qcap(){
  const inp=document.getElementById('qci');const cat=document.getElementById('qcc');
  const txt=inp.value.trim();if(!txt)return;
  const d=st.data;if(!d.diary)d.diary=S.def().diary;
  if(cat.value==='task'){
    const tasks=d.diary.planner.tasks||[];
    tasks.unshift({id:uid(),text:txt,done:false,priority:'md',at:new Date().toISOString()});
    await S.save('diary.planner.tasks',tasks);
  }else{
    const items=d.diary.brain.items||[];
    items.unshift({id:uid(),text:txt,cat:cat.value,at:new Date().toISOString()});
    await S.save('diary.brain.items',items);
  }
  st.data=S.get();inp.value='';render();toast('Captured','ok');
}

async function tglTask(id){
  const tasks=st.data.diary.planner.tasks;const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;await S.save('diary.planner.tasks',tasks);st.data=S.get();render()}
}

}

  <div class="card" style="margin-bottom:14px">
    <div class="f-row">
      <input class="inp grow" id="sn" placeholder="Screen name">
      <input class="inp grow" id="sg" placeholder="Gym name">
      <input class="inp" id="sl" placeholder="Location" style="width:150px">
      <select class="sel" id="ss" style="width:130px">${statuses.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
      <input class="inp" id="sd" type="date" style="width:150px">
      <button class="btn" onclick="addScreen()">Add</button>
    </div>
    <textarea class="txa" id="snts" placeholder="Notes…" style="min-height:56px"></textarea>
  </div>
  ${scrs.length?`
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
    ${scrs.map(s=>`
    <div class="card-sm">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px">${s.name}</div>
          <span class="badge ${s.status}">${s.status}</span>
        </div>
        <button class="btn-ghost" onclick="delScreen('${s.id}')">✕</button>
      </div>
      <div style="font-size:12px;color:var(--text3);line-height:1.8">${s.gym||'—'}<br>${s.loc||'—'}${s.date?`<br><span style="color:var(--text3)">${fd(s.date)}</span>`:''}</div>
      ${s.notes?`<div style="font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">${s.notes}</div>`:''}
    </div>`).join('')}
  </div>`:'<div class="empty"><p>No screens added yet.</p></div>'}`;
}

async function addScreen(){
  const name=document.getElementById('sn').value.trim();if(!name)return;
  const scrs=st.data.screens.screens||[];
  scrs.push({id:uid(),name,gym:document.getElementById('sg').value,loc:document.getElementById('sl').value,status:document.getElementById('ss').value,date:document.getElementById('sd').value||null,notes:document.getElementById('snts').value,at:new Date().toISOString()});
  await S.save('screens.screens',scrs);st.data=S.get();go('screens','screens');toast('Screen added','ok');
}
async function delScreen(id){
  const scrs=st.data.screens.screens.filter(x=>x.id!==id);
  await S.save('screens.screens',scrs);st.data=S.get();go('screens','screens');
}

function sLocker(){
  const items=(st.data?.screens?.locker?.items)||[];
  const types=['Note','Research','Business Idea'];
  return`
  <div class="g2">
    <div class="card">
      <div class="card-label">Add item</div>
      <div class="field" style="margin-bottom:12px"><input class="inp grow" id="lkt" placeholder="Title…" style="width:100%"></div>
      <textarea class="txa" id="lkb" placeholder="Content…" style="min-height:90px;margin-bottom:12px"></textarea>
      <div style="display:flex;gap:10px;align-items:center">
        <select class="sel" id="lktype" style="flex:1">${types.map(t=>`<option>${t}</option>`).join('')}</select>
        <button class="btn" onclick="addLock()">Save</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Stored items <span style="color:var(--text3)">${items.length}</span></div>
      ${items.length?items.map(i=>`
      <div class="li">
        <div class="li-body">
          <div style="font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${i.type}</div>
          <div class="li-title">${i.title}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px;font-weight:300">${i.body||''}</div>
        </div>
        <button class="btn-ghost" onclick="delLock('${i.id}')">✕</button>
      </div>`).join(''):'<div class="empty"><p>Locker is empty.</p></div>'}
    </div>
  </div>`;
}

async function addLock(){
  const title=document.getElementById('lkt').value.trim();if(!title)return;
  const items=st.data.screens.locker.items||[];
  items.push({id:uid(),title,body:document.getElementById('lkb').value,type:document.getElementById('lktype').value,at:new Date().toISOString()});
  await S.save('screens.locker.items',items);st.data=S.get();go('screens','locker');toast('Saved','ok');
}
async function delLock(id){
  const items=st.data.screens.locker.items.filter(x=>x.id!==id);
  await S.save('screens.locker.items',items);st.data=S.get();go('screens','locker');
}

function sPlan(){
  const p=st.data?.screens?.plan||{};
  const tasks=p.tasks||[];const opps=p.opps||[];const fu=p.fu||[];
  return`
  <div class="card" style="margin-bottom:14px">
    <div class="f-row">
      <input class="inp grow" id="pt" placeholder="Item description…">
      <select class="sel" id="ptype" style="width:150px">
        <option value="tasks">Task</option>
        <option value="opps">Opportunity</option>
        <option value="fu">Follow-up</option>
      </select>
      <button class="btn" onclick="addPlan()">Add</button>
    </div>
  </div>
  <div class="g3">
    <div class="card">
      <div class="card-label">Tasks <span style="color:var(--text3)">${tasks.length}</span></div>
      ${tasks.map(t=>`<div class="li"><div class="cb ${t.done?'on':''}" onclick="tglPlan('${t.id}')"></div><div class="li-body"><div class="li-title" style="${t.done?'text-decoration:line-through;opacity:.35':''}">${t.text}</div></div><button class="btn-ghost" onclick="delPlan('tasks','${t.id}')">✕</button></div>`).join('')||'<div class="empty"><p>—</p></div>'}
    </div>
    <div class="card">
      <div class="card-label">Opportunities <span style="color:var(--text3)">${opps.length}</span></div>
      ${opps.map(o=>`<div class="li"><div class="li-body"><div class="li-title">${o.text}</div><div class="li-sub">${fd(o.at)}</div></div><button class="btn-ghost" onclick="delPlan('opps','${o.id}')">✕</button></div>`).join('')||'<div class="empty"><p>—</p></div>'}
    </div>
    <div class="card">
      <div class="card-label">Follow-ups <span style="color:var(--text3)">${fu.length}</span></div>
      ${fu.map(f=>`<div class="li"><div class="li-body"><div class="li-title">${f.text}</div><div class="li-sub">${fd(f.at)}</div></div><button class="btn-ghost" onclick="delPlan('fu','${f.id}')">✕</button></div>`).join('')||'<div class="empty"><p>—</p></div>'}
    </div>
  </div>`;
}

async function addPlan(){
  const t=document.getElementById('pt').value.trim();if(!t)return;
  const type=document.getElementById('ptype').value;
  const p=st.data.screens.plan;p[type]=p[type]||[];
  p[type].push({id:uid(),text:t,done:false,at:new Date().toISOString()});
  await S.save('screens.plan',p);st.data=S.get();go('screens','plan');toast('Added','ok');
}
async function tglPlan(id){
  const p=st.data.screens.plan;const t=p.tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;await S.save('screens.plan',p);st.data=S.get();go('screens','plan')}
}
async function delPlan(type,id){
  const p=st.data.screens.plan;p[type]=p[type].filter(x=>x.id!==id);
  await S.save('screens.plan',p);st.data=S.get();go('screens','plan');
}

/* ── SEARCH FILTER ── */
function flt(prefix,inputId){
  const q=document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'});
}

/* ── INIT ── */
if(chkAuth())boot();else showLogin();
</script>
</body>
</html>
