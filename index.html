<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LewinOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b0f;--bg2:#0e1318;--bg3:#141a22;--bg4:#1c242f;
  --border:#1e2a38;--border2:#2a3a4d;
  --text:#e8edf3;--text2:#8fa3ba;--text3:#4a6070;
  --accent:#00c8ff;--accent2:#0099cc;--accent-dim:#002a38;
  --green:#00e5a0;--green-dim:#00251a;
  --amber:#ffb800;--amber-dim:#2a1e00;
  --red:#ff4d6a;--red-dim:#2a0010;
  --purple:#a78bfa;--purple-dim:#1a1230;
  --radius:10px;--radius-lg:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,#00c8ff08 0%,transparent 70%);pointer-events:none}
#login-screen::after{content:'';position:absolute;bottom:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,#a78bfa06 0%,transparent 70%);pointer-events:none}
.login-box{width:360px;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.login-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:32px;letter-spacing:0.5px}
.login-label{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;margin-bottom:16px}
.login-input:focus{border-color:var(--accent)}
.login-check{display:flex;align-items:center;gap:8px;margin-bottom:24px;cursor:pointer;font-size:12px;color:var(--text2)}
.login-check input{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius);padding:13px;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s}
.login-btn:hover{opacity:0.85}
.login-error{color:var(--red);font-size:12px;margin-bottom:12px;display:none}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:20px}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.3px;cursor:pointer}
.logo span{color:var(--accent)}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
.logout-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;transition:color 0.2s;font-family:'JetBrains Mono',monospace}
.logout-btn:hover{color:var(--red)}
#main{display:flex;flex:1;min-height:0}
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto}
.nav-section{margin-bottom:4px}
.nav-section-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px 4px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background 0.15s;color:var(--text2);font-size:12px;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{width:16px;height:16px;opacity:0.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
#content{flex:1;overflow-y:auto;padding:28px}
.page-header{margin-bottom:28px}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--text3)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:0.2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.metric-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1}
.metric-value.accent{color:var(--accent)}
.metric-value.green{color:var(--green)}
.metric-value.amber{color:var(--amber)}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);border:none;border-radius:var(--radius);padding:9px 16px;color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.3px}
.btn:hover{opacity:0.85}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:12px;border-radius:var(--radius);padding:8px 14px;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red-dim);border:1px solid var(--red);color:var(--red);font-family:'JetBrains Mono',monospace;font-size:11px;border-radius:var(--radius);padding:6px 12px;cursor:pointer;transition:opacity 0.2s}
.btn-danger:hover{opacity:0.8}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s}
.input:focus{border-color:var(--accent)}
.select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;cursor:pointer}
.textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;resize:vertical;min-height:80px;transition:border-color 0.2s}
.textarea:focus{border-color:var(--accent)}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.tag.green{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.tag.amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.tag.red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.tag.accent{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.tag.purple{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg3);padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:8px;border-radius:7px;cursor:pointer;font-size:11px;color:var(--text2);transition:all 0.15s;letter-spacing:0.5px}
.tab.active{background:var(--bg2);color:var(--accent);border:1px solid var(--border)}
.list-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-item-content{flex:1;min-width:0}
.list-item-title{font-size:13px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item-sub{font-size:11px;color:var(--text3)}
.checkbox{width:16px;height:16px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'✓';color:#000;font-size:10px;font-weight:700}
.module-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0}
.module-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.module-card:hover::before{opacity:1}
.module-card-icon{width:36px;height:36px;border-radius:var(--radius);background:var(--card-accent-dim,var(--accent-dim));display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px}
.module-card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.module-card-desc{font-size:11px;color:var(--text3);line-height:1.5}
.module-card-stats{display:flex;gap:12px;margin-top:14px;font-size:11px;color:var(--text3)}
.module-card-stats span{color:var(--text);font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;transition:color 0.2s}
.modal-close:hover{color:var(--text)}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease}
.toast-item.success{border-color:var(--green);color:var(--green)}
.toast-item.error{border-color:var(--red);color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.search-wrap{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px 10px 36px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.priority{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:0.5px;text-transform:uppercase}
.priority.high{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.priority.med{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.priority.low{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.stage{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
.stage.new{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.stage.contacted{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple)}
.stage.interested{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.stage.negotiating{background:#1a1500;color:#ffcc00;border:1px solid #ffcc00}
.stage.closed{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.stage.rejected{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.screen-status{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
.screen-status.planned{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.screen-status.active{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.screen-status.maintenance{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)}
.screen-status.removed{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.progress-bar{background:var(--bg4);border-radius:20px;height:6px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:20px;background:var(--accent);transition:width 0.5s}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-state-icon{font-size:32px;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:12px;line-height:1.6}
.qc-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;align-items:center}
.qc-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
.qc-input:focus{border-color:var(--accent)}
.qc-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-right:4px;white-space:nowrap}
#offline-banner{background:var(--amber-dim);border-bottom:1px solid var(--amber);padding:8px 24px;font-size:12px;color:var(--amber);display:none;align-items:center;gap:8px}
@media(max-width:768px){
  #sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  #content{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
const JSONBIN_BIN_ID = '6a238aa1da38895dfe8f6a56';
const JSONBIN_KEY = '$2a$10$CIHnQinqYxnaRDkfr.tDBu0RXUclMvjiQMT4SIyMtt6WGNeooJW3S';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

const StorageService = {
  _data: null,
  _dirty: false,
  _online: navigator.onLine,
  _syncTimer: null,

  async loadData() {
    try {
      const res = await fetch(JSONBIN_URL + '/latest', {
        headers: {'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false'}
      });
      if (!res.ok) throw new Error('Fetch failed');
      const json = await res.json();
      this._data = json;
      localStorage.setItem('lewinos_cache', JSON.stringify(json));
      return json;
    } catch(e) {
      const cached = localStorage.getItem('lewinos_cache');
      if (cached) { this._data = JSON.parse(cached); return this._data; }
      this._data = this._defaultData();
      return this._data;
    }
  },

  async saveData(path, value) {
    if (!this._data) await this.loadData();
    this._setNested(this._data, path, value);
    this._data.meta = this._data.meta || {};
    this._data.meta.lastSync = new Date().toISOString();
    localStorage.setItem('lewinos_cache', JSON.stringify(this._data));
    this._dirty = true;
    if (this._syncTimer) clearTimeout(this._syncTimer);
    this._syncTimer = setTimeout(() => this.syncData(), 1500);
    return true;
  },

  async syncData() {
    if (!this._dirty || !this._data) return;
    try {
      const res = await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key': JSONBIN_KEY},
        body: JSON.stringify(this._data)
      });
      if (res.ok) { this._dirty = false; showToast('Synced to cloud', 'success'); }
    } catch(e) {
      showToast('Offline — saved locally', 'error');
    }
  },

  getData(path) {
    if (!this._data) return null;
    return path ? this._getNested(this._data, path) : this._data;
  },

  _getNested(obj, path) {
    return path.split('.').reduce((o, k) => o && o[k] !== undefined ? o[k] : null, obj);
  },

  _setNested(obj, path, value) {
    const keys = path.split('.');
    let cur = obj;
    for (let i = 0; i < keys.length - 1; i++) {
      if (!cur[keys[i]] || typeof cur[keys[i]] !== 'object') cur[keys[i]] = {};
      cur = cur[keys[i]];
    }
    cur[keys[keys.length-1]] = value;
  },

  _defaultData() {
    return {
      meta:{version:'1.0.0',appName:'LewinOS',lastSync:null,createdAt:new Date().toISOString()},
      user:{username:'lewin',passwordHash:'',rememberMe:false,preferences:{theme:'dark',dashboardLayout:'grid'}},
      diary:{brain:{captures:[],tags:[],categories:['Business Ideas','Content Ideas','Trading Thoughts','Random Notes']},planner:{tasks:[]},goals:{longTerm:[],shortTerm:[],milestones:[]},journal:{entries:[]},notesVault:{notes:[],folders:[]}},
      disciplScreens:{screens:[],leads:[],locker:{notes:[],research:[],businessIdeas:[]},planningBoard:{tasks:[],opportunities:[],followUps:[]}},
      futureModules:{}
    };
  }
};

const ModuleRegistry = {
  _modules: {},
  register(mod) { this._modules[mod.id] = mod; },
  getAll() { return Object.values(this._modules); },
  get(id) { return this._modules[id]; }
};

let appState = {
  loggedIn: false,
  currentModule: 'dashboard',
  currentSubModule: null,
  data: null,
  modalOpen: false
};

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  const item = document.createElement('div');
  item.className = `toast-item ${type}`;
  item.textContent = (type==='success'?'✓ ':type==='error'?'⚠ ':'') + msg;
  t.appendChild(item);
  setTimeout(() => item.remove(), 3000);
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function checkLogin() {
  const stored = localStorage.getItem('lewinos_auth');
  if (stored) { const a = JSON.parse(stored); if (a.loggedIn) { appState.loggedIn = true; return true; } }
  return false;
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Lewin<span>OS</span></div>
      <div class="login-sub">PERSONAL OPERATING SYSTEM</div>
      <div class="login-error" id="login-err">Invalid credentials</div>
      <label class="login-label">Username</label>
      <input class="login-input" id="l-user" type="text" placeholder="username" autocomplete="username">
      <label class="login-label">Password</label>
      <input class="login-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <label class="login-check"><input type="checkbox" id="l-rem"> Remember me</label>
      <button class="login-btn" onclick="doLogin()">BOOT SYSTEM</button>
    </div>
  </div>`;
  document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
}

function doLogin() {
  const u = document.getElementById('l-user').value.trim().toLowerCase();
  const p = document.getElementById('l-pass').value;
  const rem = document.getElementById('l-rem').checked;
  if (u === 'lewin' && p === 'lewin2025') {
    appState.loggedIn = true;
    if (rem) localStorage.setItem('lewinos_auth', JSON.stringify({loggedIn:true}));
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('lewinos_auth');
  appState.loggedIn = false;
  renderLogin();
}

ModuleRegistry.register({
  id: 'diary', name: 'Diary', icon: '📓',
  desc: 'Brain, Planner, Goals, Journal & Notes',
  accentColor: '#00c8ff', accentDim: '#002a38',
  subModules: ['brain','planner','goals','journal','notes'],
  getStats(data) {
    const d = data?.diary || {};
    const tasks = (d.planner?.tasks||[]).filter(t=>!t.done).length;
    const ideas = (d.brain?.captures||[]).length;
    return `<span>${tasks}</span> tasks · <span>${ideas}</span> ideas`;
  }
});

ModuleRegistry.register({

async function initApp() {
  document.getElementById('app').innerHTML = `
  <div id="offline-banner">⚠ You are offline. Changes saved locally.</div>
  <div id="topbar">
    <div class="topbar-left">
      <div class="logo" onclick="navigate('dashboard')">Lewin<span>OS</span></div>
      <div class="topbar-status"><div class="status-dot" id="sync-dot"></div><span id="sync-status">Connecting...</span></div>
    </div>
    <div class="topbar-right">
      <button class="sync-btn" onclick="forceSync()">↺ Sync</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">${renderSidebar()}</div>
    <div id="content"></div>
  </div>`;

  window.addEventListener('offline', () => {
    document.getElementById('offline-banner').style.display = 'flex';
    document.getElementById('sync-dot').style.background = '#ffb800';
    document.getElementById('sync-status').textContent = 'Offline';
  });
  window.addEventListener('online', () => {
    document.getElementById('offline-banner').style.display = 'none';
    document.getElementById('sync-dot').style.background = '#00e5a0';
    document.getElementById('sync-status').textContent = 'Online';
    StorageService.syncData();
  });

  showToast('Loading data...','');
  appState.data = await StorageService.loadData();
  document.getElementById('sync-dot').style.background = '#00e5a0';
  document.getElementById('sync-status').textContent = 'Synced';
  navigate('dashboard');
}

function renderSidebar() {
  const mods = ModuleRegistry.getAll();
  let html = `<div class="nav-section">
    <span class="nav-section-label">System</span>
    <div class="nav-item ${appState.currentModule==='dashboard'?'active':''}" onclick="navigate('dashboard')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
  </div>
  <div class="nav-section"><span class="nav-section-label">Modules</span>`;
  mods.forEach(m => {
    html += `<div class="nav-item ${appState.currentModule===m.id?'active':''}" onclick="navigate('${m.id}')">
      <span style="font-size:14px">${m.icon}</span>${m.name}
    </div>`;
    if (appState.currentModule === m.id && m.subModules) {
      m.subModules.forEach(sub => {
        const names = {brain:'🧠 Brain',planner:'📋 Planner',goals:'🎯 Goals',journal:'✍ Journal',notes:'📁 Notes',leads:'👥 Leads',screens:'📺 Screens',locker:'🔒 Locker',planning:'🗓 Planning'};
        html += `<div class="nav-item ${appState.currentSubModule===sub?'active':''}" style="padding-left:36px;font-size:11px" onclick="navigate('${m.id}','${sub}')">
          ${names[sub]||sub}
        </div>`;
      });
    }
  });
  html += '</div>';
  return html;
}

function updateSidebar() { document.getElementById('sidebar').innerHTML = renderSidebar(); }

function navigate(moduleId, subModule=null) {
  if (moduleId === 'finance') { window.open('https://lewinfin.vercel.app','_blank'); return; }
  appState.currentModule = moduleId;
  appState.currentSubModule = subModule || (moduleId !== 'dashboard' ? ModuleRegistry.get(moduleId)?.subModules?.[0] : null);
  updateSidebar();
  renderContent();
}

async function forceSync() {
  appState.data = await StorageService.loadData();
  StorageService._dirty = true;
  await StorageService.syncData();
  renderContent();
  showToast('Synced!','success');
}

function renderContent() {
  const c = document.getElementById('content');
  const m = appState.currentModule;
  if (m === 'dashboard') { c.innerHTML = renderDashboard(); return; }
  const mod = ModuleRegistry.get(m);
  if (!mod) return;
  const sub = appState.currentSubModule || mod.subModules?.[0];
  if (m === 'diary') c.innerHTML = renderDiary(sub);
  else if (m === 'discipl') c.innerHTML = renderDisciples(sub);
}

function renderDashboard() {
  const data = appState.data || {};
  const mods = ModuleRegistry.getAll();
  const tasks = (data.diary?.planner?.tasks||[]).filter(t=>!t.done).slice(0,5);
  const captures = (data.diary?.brain?.captures||[]).slice(0,4);
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let modsHtml = mods.map(m => `
    <div class="module-card" style="--card-accent:${m.accentColor};--card-accent-dim:${m.accentDim}" onclick="navigate('${m.id}')">
      <div class="module-card-icon">${m.icon}</div>
      <div class="module-card-name">${m.name}</div>
      <div class="module-card-desc">${m.desc}</div>
      <div class="module-card-stats">${m.getStats(data)}</div>
    </div>`).join('');
  let tasksHtml = tasks.length ? tasks.map(t => `
    <div class="list-item">
      <div class="checkbox ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="list-item-content">

        </div>
      </div>
    </div>`).join('') : '<div class="empty-state"><div class="empty-state-icon">✓</div><p>No pending tasks</p></div>';
  let ideasHtml = captures.length ? captures.map(c => `
    <div class="list-item">
      <div class="list-item-content">
        <div class="list-item-title">${c.text}</div>
        <div class="list-item-sub">${c.category||'Note'} · ${formatDate(c.createdAt)}</div>
      </div>
    </div>`).join('') : '<div class="empty-state"><div class="empty-state-icon">💡</div><p>No ideas captured yet</p></div>';
  return `
    <div class="page-header">
      <div class="page-title">Good ${now.getHours()<12?'Morning':now.getHours()<18?'Afternoon':'Evening'}, Lewin</div>
      <div class="page-sub">${dateStr}</div>
    </div>
    <div class="qc-bar">
      <span class="qc-label">QUICK CAPTURE</span>
      <input class="qc-input" id="qc-input" type="text" placeholder="Capture a thought, idea or task...">
      <select id="qc-cat" class="select" style="width:130px">
        <option value="Random Notes">Random Notes</option>
        <option value="Business Ideas">Business Ideas</option>
        <option value="Content Ideas">Content Ideas</option>
        <option value="Trading Thoughts">Trading Thoughts</option>
        <option value="Task">Task</option>
      </select>
      <button class="btn" onclick="quickCapture()">+ CAPTURE</button>
    </div>
    <div class="grid-3" style="margin-bottom:24px">${modsHtml}</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">TODAY'S TASKS</div>
        ${tasksHtml}
        <button class="btn-ghost" style="margin-top:12px;width:100%" onclick="navigate('diary','planner')">View All Tasks →</button>
      </div>
      <div class="card">
        <div class="card-title">RECENT CAPTURES</div>
        ${ideasHtml}
        <button class="btn-ghost" style="margin-top:12px;width:100%" onclick="navigate('diary','brain')">Open Brain →</button>

async function quickCapture() {
  const input = document.getElementById('qc-input');
  const cat = document.getElementById('qc-cat');
  const text = input.value.trim();
  if (!text) return;
  const d = appState.data || {};
  if (!d.diary) d.diary = StorageService._defaultData().diary;
  if (cat.value === 'Task') {
    const tasks = d.diary.planner.tasks || [];
    tasks.unshift({id:uid(),text,done:false,priority:'med',createdAt:new Date().toISOString()});
    await StorageService.saveData('diary.planner.tasks', tasks);
  } else {
    const captures = d.diary.brain.captures || [];
    captures.unshift({id:uid(),text,category:cat.value,tags:[],createdAt:new Date().toISOString()});
    await StorageService.saveData('diary.brain.captures', captures);
  }
  appState.data = StorageService.getData();
  input.value = '';
  renderContent();
  showToast('Captured!','success');
}

async function toggleTask(id) {
  const tasks = appState.data.diary.planner.tasks;
  const t = tasks.find(x=>x.id===id);
  if (t) { t.done = !t.done; await StorageService.saveData('diary.planner.tasks', tasks); appState.data = StorageService.getData(); renderContent(); }
}

  await StorageService.saveData('diary.goals', goals);
  appState.data = StorageService.getData();
  navigate('diary','goals');
  showToast('Goal added!','success');

async function deleteGoal(type, id) {
  const goals = appState.data.diary.goals;
  goals[type] = goals[type].filter(g=>g.id!==id);
  await StorageService.saveData('diary.goals', goals);
  appState.data = StorageService.getData();
  navigate('diary','goals');

async function updateGoalProgress(type, id) {
  const p = prompt('Progress (0-100):');
  const val = parseInt(p);
  if (isNaN(val)) return;
  const goals = appState.data.diary.goals;
  const g = goals[type].find(x=>x.id===id);
  if (g) { g.progress=Math.min(100,Math.max(0,val)); await StorageService.saveData('diary.goals',goals); appState.data=StorageService.getData(); navigate('diary','goals'); }
}

function filterJournal() {
  const q = document.getElementById('j-search').value.toLowerCase();
  document.querySelectorAll('[id^="j-"]').forEach(el => { if(el.id==='j-search') return; el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'; });
}

function renderNotes() {
  const notes = (appState.data?.diary?.notesVault?.notes)||[];
  const folders = (appState.data?.diary?.notesVault?.folders)||['General','Important','Research','Business'];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">NEW NOTE</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="n-title" placeholder="Note title..." style="flex:1;min-width:200px">
        <select class="select" id="n-folder" style="width:140px">${folders.map(f=>`<option>${f}</option>`).join('')}</select>
      </div>
      <textarea class="textarea" id="n-body" placeholder="Note content..." style="margin-top:10px;min-height:100px"></textarea>
      <button class="btn" style="margin-top:10px" onclick="addNote()">+ SAVE NOTE</button>
    </div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="n-search" placeholder="Search notes..." oninput="filterNotes()"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px" id="notes-grid">
    ${notes.length ? notes.map(n=>`
      <div class="card-sm" id="note-${n.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px">${n.title}</div>
            <span class="tag">${n.folder||'General'}</span>
          </div>
          <button class="btn-danger" onclick="deleteNote('${n.id}')">✕</button>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.6;max-height:80px;overflow:hidden">${n.body}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:8px">${formatDate(n.createdAt)}</div>
      </div>`).join('') : '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📁</div><p>Notes vault is empty</p></div>'}
    </div>`;
}

async function addNote() {
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  if (!title) return;
  const notes = appState.data.diary.notesVault.notes || [];
  notes.unshift({id:uid(),title,body,folder:document.getElementById('n-folder').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('diary.notesVault.notes', notes);
  appState.data = StorageService.getData();
  navigate('diary','notes');
  showToast('Note saved!','success');
}

async function deleteNote(id) {
  const notes = appState.data.diary.notesVault.notes.filter(n=>n.id!==id);
  await StorageService.saveData('diary.notesVault.notes', notes);
  appState.data = StorageService.getData();
  navigate('diary','notes');
}

function filterNotes() {
  const q = document.getElementById('n-search').value.toLowerCase();
  document.querySelectorAll('[id^="note-"]').forEach(el => { el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'; });
}

function renderDisciples(sub) {
  const fns = {leads:renderLeads,screens:renderScreens,locker:renderLocker,planning:renderPlanning};
  const d = appState.data?.disciplScreens || {};
  const screens = d.screens || [];
  const leads = d.leads || [];
  const active = screens.filter(s=>s.status==='active').length;
  const planned = screens.filter(s=>s.status==='planned').length;
  const newLeads = leads.filter(l=>l.stage==='new'||l.stage==='interested'||l.stage==='contacted').length;
  return `
    <div class="page-header">
      <div class="page-title">📺 Discipl Screens</div>
      <div class="page-sub">Leads · Screens · Locker · Planning</div>
    </div>
    <div class="grid-4" style="margin-bottom:24px">
      <div class="metric"><div class="metric-label">Total Screens</div><div class="metric-value accent">${screens.length}</div></div>
      <div class="metric"><div class="metric-label">Active Screens</div><div class="metric-value green">${active}</div></div>
      <div class="metric"><div class="metric-label">Planned</div><div class="metric-value amber">${planned}</div></div>
      <div class="metric"><div class="metric-label">Active Leads</div><div class="metric-value">${newLeads}</div></div>
    </div>
    <div class="tabs">
      ${['leads','screens','locker','planning'].map(s=>`<div class="tab ${sub===s?'active':''}" onclick="navigate('discipl','${s}')">${{leads:'👥 Leads',screens:'📺 Screens',locker:'🔒 Locker',planning:'🗓 Planning'}[s]}</div>`).join('')}
    </div>
    ${(fns[sub]||renderLeads)()}`;
}

function renderLeads() {
  const leads = (appState.data?.disciplScreens?.leads)||[];
  const stages = ['new','contacted','interested','negotiating','closed','rejected'];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">ADD LEAD</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="ld-name" placeholder="Contact name..." style="flex:1;min-width:160px">
        <input class="input" id="ld-biz" placeholder="Business/Gym name..." style="flex:1;min-width:160px">
        <input class="input" id="ld-phone" placeholder="Phone..." style="width:140px">
        <input class="input" id="ld-email" placeholder="Email..." style="width:180px">
        <select class="select" id="ld-stage" style="width:130px">${stages.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
        <button class="btn" onclick="addLead()">+ ADD</button>
      </div>
      <textarea class="textarea" id="ld-notes" placeholder="Notes..." style="margin-top:10px;min-height:60px"></textarea>
    </div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="ld-search" placeholder="Search leads..." oninput="filterLeads()"></div>
    ${leads.length ? `
    <div class="card" id="leads-table">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);letter-spacing:1px">NAME</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);letter-spacing:1px">BUSINESS</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);letter-spacing:1px">CONTACT</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);letter-spacing:1px">STAGE</th>
          <th style="text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);letter-spacing:1px">ACTIONS</th>
        </tr></thead>
        <tbody>
        ${leads.map(l=>`
          <tr style="border-bottom:1px solid var(--border)" id="lead-${l.id}">
            <td style="padding:12px;font-size:13px;color:var(--text)">${l.name}</td>
            <td style="padding:12px;font-size:12px;color:var(--text2)">${l.business||'—'}</td>
            <td style="padding:12px;font-size:11px;color:var(--text3)">${l.phone||''} ${l.email||''}</td>
            <td style="padding:12px"><span class="stage ${l.stage}">${l.stage}</span></td>
            <td style="padding:12px">
              <select class="select" style="width:120px;padding:4px 8px;font-size:11px" onchange="updateLeadStage('${l.id}',this.value)">
                ${stages.map(s=>`<option value="${s}" ${s===l.stage?'selected':''}>${s}</option>`).join('')}
              </select>
              <button class="btn-danger" style="margin-left:6px" onclick="deleteLead('${l.id}')">✕</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '<div class="empty-state"><div class="empty-state-icon">👥</div><p>No leads yet. Start adding contacts!</p></div>'}`;
}

async function addLead() {
  const name = document.getElementById('ld-name').value.trim();
  if (!name) return;
  const leads = appState.data.disciplScreens.leads || [];
  leads.unshift({id:uid(),name,business:document.getElementById('ld-biz').value,phone:document.getElementById('ld-phone').value,email:document.getElementById('ld-email').value,stage:document.getElementById('ld-stage').value,notes:document.getElementById('ld-notes').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.leads', leads);
  appState.data = StorageService.getData();
  navigate('discipl','leads');
  showToast('Lead added!','success');
}

async function updateLeadStage(id, stage) {
  const leads = appState.data.disciplScreens.leads;
  const l = leads.find(x=>x.id===id);
  if (l) { l.stage=stage; await StorageService.saveData('disciplScreens.leads',leads); appState.data=StorageService.getData(); navigate('discipl','leads'); showToast('Stage updated','success'); }
}

async function deleteLead(id) {
  const leads = appState.data.disciplScreens.leads.filter(l=>l.id!==id);
  await StorageService.saveData('disciplScreens.leads', leads);
  appState.data = StorageService.getData();
  navigate('discipl','leads');
  showToast('Lead deleted','');
}

function filterLeads() {
  const q = document.getElementById('ld-search').value.toLowerCase();
  document.querySelectorAll('[id^="lead-"]').forEach(el => { el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'; });
}

function renderScreens() {
  const screens = (appState.data?.disciplScreens?.screens)||[];
  const statuses = ['planned','active','maintenance','removed'];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">ADD SCREEN</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="sc-name" placeholder="Screen name..." style="flex:1;min-width:160px">
        <input class="input" id="sc-gym" placeholder="Gym name..." style="flex:1;min-width:160px">
        <input class="input" id="sc-loc" placeholder="Location/City..." style="width:150px">
        <select class="select" id="sc-status" style="width:130px">${statuses.map(s=>`<option value="${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select>
        <input class="input" id="sc-date" type="date" style="width:150px">
        <button class="btn" onclick="addScreen()">+ ADD</button>
      </div>
      <textarea class="textarea" id="sc-notes" placeholder="Notes..." style="margin-top:10px;min-height:60px"></textarea>
    </div>
    ${screens.length ? `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
      ${screens.map(s=>`
        <div class="card-sm">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">${s.name}</div>
              <span class="screen-status ${s.status}">${s.status}</span>
            </div>
            <button class="btn-danger" onclick="deleteScreen('${s.id}')">✕</button>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:4px">🏋 ${s.gym||'—'}</div>
          <div style="font-size:12px;color:var(--text3)">📍 ${s.location||'—'}</div>
          ${s.installDate?`<div style="font-size:11px;color:var(--text3);margin-top:6px">Installed: ${formatDate(s.installDate)}</div>`:''}
          ${s.notes?`<div style="font-size:11px;color:var(--text3);margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${s.notes}</div>`:''}
        </div>`).join('')}
    </div>` : '<div class="empty-state"><div class="empty-state-icon">📺</div><p>No screens registered yet</p></div>'}`;
}

async function addScreen() {
  const name = document.getElementById('sc-name').value.trim();
  if (!name) return;
  const screens = appState.data.disciplScreens.screens || [];
  screens.push({id:uid(),name,gym:document.getElementById('sc-gym').value,location:document.getElementById('sc-loc').value,status:document.getElementById('sc-status').value,installDate:document.getElementById('sc-date').value||null,notes:document.getElementById('sc-notes').value,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.screens', screens);
  appState.data = StorageService.getData();
  navigate('discipl','screens');
  showToast('Screen added!','success');
}

async function deleteScreen(id) {
  const screens = appState.data.disciplScreens.screens.filter(s=>s.id!==id);
  await StorageService.saveData('disciplScreens.screens', screens);
  appState.data = StorageService.getData();
  navigate('discipl','screens');
}

function renderLocker() {
  const locker = appState.data?.disciplScreens?.locker || {};
  const notes = locker.notes || [];
  const ideas = locker.businessIdeas || [];
  return `
    <div class="grid-2">
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">ADD TO LOCKER</div>
          <div class="field"><label>Title</label><input class="input" id="lk-title" placeholder="Title..."></div>
          <div class="field"><label>Content</label><textarea class="textarea" id="lk-body" placeholder="Notes, research, info..." style="min-height:80px"></textarea></div>
          <select class="select" id="lk-type" style="margin-bottom:10px">
            <option value="notes">Note</option>
            <option value="research">Research</option>
            <option value="businessIdeas">Business Idea</option>
          </select>
          <button class="btn" onclick="addToLocker()">+ SAVE</button>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">LOCKED ITEMS (${notes.length + ideas.length + (locker.research||[]).length})</div>
          ${[...notes.map(n=>({...n,_type:'Note'})),...(locker.research||[]).map(r=>({...r,_type:'Research'})),...ideas.map(i=>({...i,_type:'Idea'}))].map(item=>`
            <div class="list-item">
              <div style="flex:1">
                <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
                  <span class="tag accent">${item._type}</span>
                  <span style="font-size:12px;color:var(--text);font-weight:500">${item.title}</span>
                </div>
                <div style="font-size:12px;color:var(--text3);line-height:1.5">${item.body||item.text||''}</div>
              </div>
              <button class="btn-danger" onclick="deleteLockerItem('${item._type.toLowerCase()}','${item.id}')">✕</button>
            </div>`).join('') || '<div class="empty-state"><p>Locker is empty</p></div>'}
        </div>
      </div>
    </div>`;
}

async function addToLocker() {
  const title = document.getElementById('lk-title').value.trim();
  const body = document.getElementById('lk-body').value.trim();
  if (!title) return;
  const type = document.getElementById('lk-type').value;
  const locker = appState.data.disciplScreens.locker;
  locker[type] = locker[type] || [];
  locker[type].push({id:uid(),title,body,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.locker', locker);
  appState.data = StorageService.getData();
  navigate('discipl','locker');
  showToast('Saved to locker!','success');
}

async function deleteLockerItem(type, id) {
  const typeMap = {note:'notes',research:'research',idea:'businessIdeas'};
  const key = typeMap[type] || type+'s';
  const locker = appState.data.disciplScreens.locker;
  const arr = key==='notes'?locker.notes:key==='research'?locker.research:locker.businessIdeas;
  if (arr) { const idx = arr.findIndex(x=>x.id===id); if(idx>-1) arr.splice(idx,1); }
  await StorageService.saveData('disciplScreens.locker', locker);
  appState.data = StorageService.getData();
  navigate('discipl','locker');
}

function renderPlanning() {
  const pb = appState.data?.disciplScreens?.planningBoard || {};
  const tasks = pb.tasks || [];
  const opps = pb.opportunities || [];
  const followUps = pb.followUps || [];
  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">ADD PLANNING ITEM</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input class="input" id="pb-text" placeholder="Item description..." style="flex:1;min-width:200px">
        <select class="select" id="pb-type" style="width:160px">
          <option value="tasks">Task</option>
          <option value="opportunities">Opportunity</option>
          <option value="followUps">Follow-up</option>
        </select>
        <button class="btn" onclick="addPlanItem()">+ ADD</button>
      </div>
    </div>
    <div class="grid-3">
      <div class="card">
        <div class="card-title">📋 TASKS (${tasks.length})</div>
        ${tasks.map(t=>`<div class="list-item"><div class="checkbox ${t.done?'checked':''}" onclick="togglePlanTask('${t.id}')"></div><div class="list-item-content"><div class="list-item-title" style="${t.done?'text-decoration:line-through;opacity:0.5':''}">${t.text}</div></div><button class="btn-danger" onclick="deletePlanItem('tasks','${t.id}')">✕</button></div>`).join('') || '<div class="empty-state"><p>No tasks</p></div>'}
      </div>
      <div class="card">
        <div class="card-title">🚀 OPPORTUNITIES (${opps.length})</div>
        ${opps.map(o=>`<div class="list-item"><div class="list-item-content"><div class="list-item-title">${o.text}</div><div class="list-item-sub">${formatDate(o.createdAt)}</div></div><button class="btn-danger" onclick="deletePlanItem('opportunities','${o.id}')">✕</button></div>`).join('') || '<div class="empty-state"><p>No opportunities</p></div>'}
      </div>
      <div class="card">
        <div class="card-title">🔔 FOLLOW-UPS (${followUps.length})</div>
        ${followUps.map(f=>`<div class="list-item"><div class="list-item-content"><div class="list-item-title">${f.text}</div><div class="list-item-sub">${formatDate(f.createdAt)}</div></div><button class="btn-danger" onclick="deletePlanItem('followUps','${f.id}')">✕</button></div>`).join('') || '<div class="empty-state"><p>No follow-ups</p></div>'}
      </div>
    </div>`;
}

async function addPlanItem() {
  const text = document.getElementById('pb-text').value.trim();
  if (!text) return;
  const type = document.getElementById('pb-type').value;
  const pb = appState.data.disciplScreens.planningBoard;
  pb[type] = pb[type] || [];
  pb[type].push({id:uid(),text,done:false,createdAt:new Date().toISOString()});
  await StorageService.saveData('disciplScreens.planningBoard', pb);
  appState.data = StorageService.getData();
  navigate('discipl','planning');
  showToast('Added!','success');
}

async function togglePlanTask(id) {
  const pb = appState.data.disciplScreens.planningBoard;
  const t = pb.tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;await StorageService.saveData('disciplScreens.planningBoard',pb);appState.data=StorageService.getData();navigate('discipl','planning');}
}

async function deletePlanItem(type, id) {
  const pb = appState.data.disciplScreens.planningBoard;
  pb[type] = pb[type].filter(x=>x.id!==id);
  await StorageService.saveData('disciplScreens.planningBoard', pb);
  appState.data = StorageService.getData();
  navigate('discipl','planning');
}

if (checkLogin()) { initApp(); } else { renderLogin(); }
</script>
</body>
</html>
